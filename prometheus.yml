global:
  scrape_interval:     10s
  evaluation_interval: 10s

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: fix_producer
    static_configs:
      - targets: ["fix-producer:8001"]

  - job_name: consumer
    static_configs:
      - targets: ["consumer:8002"]

  - job_name: ebpf_probe
    static_configs:
      - targets: ["ebpf-probe:8004"]

  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]
